name: Fix Kanarek clean reader noise capture

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  fix:
    if: github.head_ref == 'feat/kanarek-clean-reader' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: feat/kanarek-clean-reader
          fetch-depth: 0

      - name: Suppress captures inside removed containers
        run: |
          python <<'PY'
          from pathlib import Path
          import base64

          path = Path('kanarek/worker/src/article.ts')
          text = path.read_text()
          marker = 'export interface ArticleCandidate {\n  title: string;\n  blocks: string[];\n}\n'
          if text.count(marker) != 1:
              raise SystemExit(f'Expected one ArticleCandidate interface, found {text.count(marker)}')
          if 'export class ArticleNoiseGate' in text:
              raise SystemExit('ArticleNoiseGate already exists')
          gate = base64.b64decode('').decode()
          text = text.replace(marker, marker + '\n' + gate, 1)

          start = text.index('async function extractCandidates(')
          end = text.index('\n\nfunction extractMetadata', start)
          replacement = base64.b64decode('').decode()
          path.write_text(text[:start] + replacement + text[end:])
          PY
          rm .github/workflows/kanarek-clean-reader-noise-fix.yml
          git diff --check

      - name: Commit fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(kanarek): suppress article noise descendants"
          git push origin HEAD:feat/kanarek-clean-reader
