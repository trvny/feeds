name: Worker CI

on:
  push:
    branches: [main]
    paths: ["feedget/worker/**"]
  pull_request:
    branches: [main]
    paths: ["feedget/worker/**"]
concurrency:
  group: worker-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    runs-on: ubuntu-slim
    defaults:
      run:
        working-directory: feedget/worker
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: feedget/worker/package-lock.json
      - run: npm install
      - run: npm run typecheck
      - run: npm test
