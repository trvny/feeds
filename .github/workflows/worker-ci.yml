name: Worker CI

on:
  push:
    branches: [main]
    paths: ["kanarek/worker/**", "feeds-proxy/**"]
  pull_request:
    branches: [main]
    paths: ["kanarek/worker/**", "feeds-proxy/**"]
concurrency:
  group: worker-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck-kanarek:
    runs-on: ubuntu-slim
    permissions:
      contents: read
    defaults:
      run:
        working-directory: kanarek/worker
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/setup-node@v7
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: kanarek/worker/package-lock.json
      - run: npm install
      - run: npm run typecheck
      - run: npm test

  typecheck-feeds-proxy:
    runs-on: ubuntu-slim
    permissions:
      contents: read
    defaults:
      run:
        working-directory: feeds-proxy
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/setup-node@v7
        with:
          node-version: "24"
      - run: npm install
      - run: npm run typecheck
