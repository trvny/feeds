name: Android CI

on: # yamllint disable-line rule:truthy
  push:
    branches: [main]
    paths: ["kanarek/**", "!kanarek/worker/**"]
  pull_request:
    branches: [main]
    paths: ["kanarek/**", "!kanarek/worker/**"]

concurrency:
  group: android-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: kanarek
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: "9.6.0"

      - name: Generate Gradle wrapper if missing
        run: |
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            gradle wrapper --gradle-version 9.6.0
          fi

      - name: Build, test & lint
        # Flavor-qualified tasks: with product flavors (play/foss) AGP no longer creates
        # plain testDebugUnitTest/lintDebug. Unit tests and lint run on play (superset of
        # sources); fossDebug is assembled too so a GMS reference leaking into main/foss
        # sources fails CI immediately.
        run: |
          set -o pipefail
          ./gradlew assemblePlayDebug assembleFossDebug testPlayDebugUnitTest lintPlayDebug --stacktrace 2>&1 | tee gradle.log

      - name: Upload Gradle diagnostics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: kanarek-gradle-log
          path: kanarek/gradle.log
          if-no-files-found: warn

      - name: Upload debug APK
        uses: actions/upload-artifact@v7
        with:
          name: kanarek-debug-apk
          path: kanarek/app/build/outputs/apk/*/debug/*.apk
          if-no-files-found: warn
