name: Normalize Line Endings

on:
  workflow_dispatch:  # Manual trigger

jobs:
  normalize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      
      - name: Configure git
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
      
      - name: Create .gitattributes
        run: printf '* text=auto eol=lf\n' > .gitattributes
      
      - name: Normalize line endings
        run: |
          git add .gitattributes
          git add --renormalize .
          git commit -m "Normalize line endings to LF; enforce via .gitattributes" || echo "No changes to commit"
      
      - name: Push changes
        run: git push
