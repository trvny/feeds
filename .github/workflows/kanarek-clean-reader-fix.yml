name: Finalize Kanarek clean reader

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  fix:
    if: github.head_ref == 'feat/kanarek-clean-reader' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: feat/kanarek-clean-reader
          fetch-depth: 0

      - name: Apply final correctness fixes
        run: |
          python <<'PY'
          from pathlib import Path

          def replace(path: str, old: str, new: str) -> None:
              file = Path(path)
              text = file.read_text()
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"{path}: expected one match, found {count}: {old[:100]!r}")
              file.write_text(text.replace(old, new))

          replace(
              "kanarek/app/src/main/java/com/kanarek/ui/ReaderScreen.kt",
              "        cleanArticle = runCatching { reader.fetch(item.link, backendUrl) }.getOrNull()\n",
              """        cleanArticle =
            try {
                reader.fetch(item.link, backendUrl)
            } catch (cancelled: CancellationException) {
                throw cancelled
            } catch (_: Exception) {
                null
            }
""",
          )
          replace(
              "kanarek/app/src/main/java/com/kanarek/ui/ReaderScreen.kt",
              "    }\n}\n@Composable\nprivate fun PreviewCard(\n",
              "    }\n}\n\n@Composable\nprivate fun PreviewCard(\n",
          )
          replace(
              "kanarek/worker/src/article.ts",
              "export async function handleArticle(req: Request, endpoint: URL, env: Env, ctx: ExecutionContext): Promise<Response> {\n",
              "export async function handleArticle(_req: Request, endpoint: URL, env: Env, ctx: ExecutionContext): Promise<Response> {\n",
          )
          PY
          rm .github/workflows/kanarek-clean-reader-fix.yml
          git diff --check

      - name: Commit fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(kanarek): finalize clean reader cancellation"
          git push origin HEAD:feat/kanarek-clean-reader
