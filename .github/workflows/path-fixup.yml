name: path-fixup

# Jednorazowy: po przeprowadzce do feedseek/ poprawia ścieżki raw URL
# (self-link w feedach + tabela w README) z /main/feeds/ na /main/feedseek/feeds/.
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Repoint raw feed URLs to feedseek/feeds/
        run: |
          set -e
          sed -i 's#/main/feeds/feed_#/main/feedseek/feeds/feed_#g' \
            feedseek/feed_generators/utils.py \
            feedseek/README.md
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add -A
          if git diff --staged --quiet; then
            echo "nothing to change"
          else
            git commit -m "fix: repoint rel=self + README feed URLs to feedseek/feeds/"
            git push
          fi
