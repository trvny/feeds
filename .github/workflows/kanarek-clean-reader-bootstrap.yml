name: Bootstrap Kanarek clean reader

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'feat/kanarek-clean-reader' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: feat/kanarek-clean-reader
          fetch-depth: 0

      - name: Wire clean reader into Worker and app
        run: |
          python <<'PY'
          from pathlib import Path
          import base64
          import xml.etree.ElementTree as ET

          def replace(path: str, old: str, new: str) -> None:
              file = Path(path)
              text = file.read_text()
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"{path}: expected one match, found {count}: {old[:100]!r}")
              file.write_text(text.replace(old, new))

          index = "kanarek/worker/src/index.ts"
          replace(
              index,
              'import { generateAtomFeed, generateRssFeed, generateJsonFeed, parseFeed as parseFeedSmith } from "feedsmith";\n',
              'import { generateAtomFeed, generateRssFeed, generateJsonFeed, parseFeed as parseFeedSmith } from "feedsmith";\nimport { handleArticle } from "./article";\n',
          )
          replace(
              index,
              ' *   GET /?feeds=...&format=atom|rss|jsonfeed\n',
              ' *   GET /article?url=<article>\n *     -> { url, title, author, image, content, wordCount }\n *     Extracts a public article into inert plain text. JSON-LD articleBody is preferred;\n *     HTML fallback keeps article paragraphs while dropping scripts, forms, trackers,\n *     navigation, related-content boxes, newsletter prompts, and advertisement containers.\n *\n *   GET /?feeds=...&format=atom|rss|jsonfeed\n',
          )
          replace(
              index,
              '    if (url.pathname === "/scrape") return handleScrape(req, url, env, ctx);\n',
              '    if (url.pathname === "/scrape") return handleScrape(req, url, env, ctx);\n    if (url.pathname === "/article") return handleArticle(req, url, env, ctx);\n',
          )

          reader = "kanarek/app/src/main/java/com/kanarek/ui/ReaderScreen.kt"
          replace(
              reader,
              'import com.kanarek.data.FeedParser\n',
              'import com.kanarek.data.ArticleReader\nimport com.kanarek.data.CleanArticle\nimport com.kanarek.data.FeedParser\n',
          )
          replace(
              reader,
              '    val openFailedMsg = stringResource(R.string.article_open_failed)\n',
              '    val openFailedMsg = stringResource(R.string.article_open_failed)\n    val articleReader = remember { ArticleReader() }\n',
          )
          replace(
              reader,
              '                    ArticlePreview(\n                        item = item,\n                        onOpenArticle = { openArticleExternally(item.link) },\n',
              '                    ArticlePreview(\n                        item = item,\n                        backendUrl = effectiveBackend.trim().ifBlank { NewsRepository.DEFAULT_BACKEND },\n                        reader = articleReader,\n                        onOpenArticle = { openArticleExternally(item.link) },\n',
          )
          reader_path = Path(reader)
          reader_text = reader_path.read_text()
          start = reader_text.index("@Composable\nprivate fun ArticlePreview(")
          end = reader_text.index("\n@Composable\nprivate fun PreviewCard", start)
          encoded = ""
          new_function = base64.b64decode(encoded).decode()
          reader_path.write_text(reader_text[:start] + new_function.rstrip() + reader_text[end:])

          en = "kanarek/app/src/main/res/values/strings.xml"
          replace(
              en,
              '    <string name="article_preview">Article preview</string>\n',
              '    <string name="article_preview">Article preview</string>\n    <string name="clean_reader_loading">Cleaning article…</string>\n    <string name="clean_reader_active">Clean reader mode · ads and page chrome removed</string>\n    <string name="clean_reader_fallback">Clean reader unavailable — showing the feed summary.</string>\n',
          )
          pl = "kanarek/app/src/main/res/values-pl/strings.xml"
          replace(
              pl,
              '    <string name="article_preview">Podgląd artykułu</string>\n',
              '    <string name="article_preview">Podgląd artykułu</string>\n    <string name="clean_reader_loading">Czyszczę artykuł…</string>\n    <string name="clean_reader_active">Tryb czytania · reklamy i elementy strony usunięte</string>\n    <string name="clean_reader_fallback">Tryb czytania niedostępny — pokazuję opis z kanału.</string>\n',
          )

          readme = "kanarek/README.md"
          replace(
              readme,
              '- **Rich cards** — article image (`media:content` / `enclosure` / inline `<img>`), source label,\n  relative time, headline + summary over a gradient scrim.\n',
              '- **Rich cards** — article image (`media:content` / `enclosure` / inline `<img>`), source label,\n  relative time, headline + summary over a gradient scrim.\n- **Clean reader mode** — opening a story asks the Worker for an inert plain-text article body.\n  JSON-LD `articleBody` is preferred; the HTML fallback keeps article paragraphs while removing\n  scripts, forms, frames, navigation, trackers, newsletter prompts, related-content boxes, and\n  obvious advertisement containers. Public HTTP(S) pages only, redirect targets are revalidated,\n  responses are capped and cached, and the feed summary remains the fallback when extraction fails.\n',
          )
          history = "kanarek/docs/HISTORY.md"
          replace(
              history,
              '## Zrobione (chronologicznie)\n',
              '## Zrobione (chronologicznie)\n- **Czysty tryb artykułu**: endpoint Workera `/article` pobiera wyłącznie publiczne strony HTTP(S),\n  sprawdza każdy redirect i zwraca pasywny tekst zamiast źródłowego HTML. Najpierw wykorzystuje\n  `articleBody` z JSON-LD, a fallback HTMLRewriter wybiera treść artykułu i usuwa skrypty, formularze,\n  ramki, nawigację, reklamy, boksy polecanych tekstów, newslettery oraz elementy społecznościowe.\n  Aplikacja ładuje wynik w podglądzie, lecz przy błędzie zachowuje opis RSS i link do oryginału.\n',
          )

          for path in [en, pl]:
              ET.parse(path)
          PY
          rm .github/workflows/kanarek-clean-reader-bootstrap.yml
          git diff --check

      - name: Commit integration
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat(kanarek): integrate clean article reader"
          git push origin HEAD:feat/kanarek-clean-reader
