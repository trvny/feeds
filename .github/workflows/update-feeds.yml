name: Update Feeds

on:
  schedule:
    - cron: "0 * * * *"   # hourly
  workflow_dispatch:

concurrency:
  group: update-feeds
  cancel-in-progress: false

permissions:
  contents: write
  actions: write
  
jobs:
  update-feeds:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:

      - name: Keep workflow alive
        # Scheduled workflows are auto-disabled after 60 days of repo
        # inactivity; re-enabling on every run prevents that.
        run: |
          curl -s -X PUT \
            -H "Authorization: Bearer ${{ github.token }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/update-feeds.yml/enable"

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install uv and Python
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          python-version: "3.11"

      - name: Generate feeds
        env:
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
          # OPENWEATHER_LOCATION: "Chrzanów,PL"   # optional override
          # OPENWEATHER_UNITS: "metric"            # metric | imperial | standard
          VISUALCROSSING_API_KEY: ${{ secrets.VISUALCROSSING_API_KEY }}
          VISUALCROSSING_LOCATION: "32-500, Chrzanów, Woj. Małopolskie, Polska"  # readable place name in titles
          # VISUALCROSSING_UNITS: "metric"
          # VISUALCROSSING_LANG: "pl"
        run: |
          set -e
          uv sync
          uv run feed_generators/run_all_feeds.py     

      - name: Validate feeds
        run: uv run feed_generators/validate_feeds.py

      - name: Commit and push updates
        if: github.ref == 'refs/heads/main'
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add feeds cache
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m 'Update feeds'
            git push || { git pull --rebase && git push; }
          fi
