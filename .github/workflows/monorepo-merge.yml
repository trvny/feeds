name: monorepo-merge

# Jednorazowy job: scala travino/feedy do tego repo jako monorepo i otwiera PR.
# Odpalany ręcznie (Run workflow) albo dispatchem. Nie dotyka main — robi gałąź `monorepo`.
on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: monorepo-merge
  cancel-in-progress: false

jobs:
  merge:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout (pełna historia)
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install git-filter-repo
        run: pipx install git-filter-repo

      - name: Merge
        run: bash tools/merge-monorepo.sh
