name: Deploy Pages

on:
  # zizmor: ignore[dangerous-triggers] deploy-after-build on our own workflow; checks out default ref, no untrusted PR code
  workflow_run:
    workflows: ["Update Feeds"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    # Always build from the current default branch after Update Feeds completes.
    # A failed source run may still have committed healthy partial feed updates.
    runs-on: ubuntu-slim
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v6

      - name: Build site
        working-directory: feedseek
        env:
          SITE_URL: ${{ steps.pages.outputs.base_url }}
        run: python3 site/build_site.py

      - name: Generate subscriptions.opml
        working-directory: feedseek
        run: python3 site/make_opml.py

      - name: Add live reader
        working-directory: feedseek
        run: |
          mkdir -p public/reader
          cp site/reader.html public/reader/index.html
          cp site/reader.js public/reader/reader.js
          cp public/favicon.svg public/reader/favicon.svg
          cp public/favicon.ico public/reader/favicon.ico
          cp public/site.webmanifest public/reader/site.webmanifest
          cp -r public/icons public/reader/icons

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: feedseek/public

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v5
