name: Deploy Pages

# Runs after the hourly "Update Feeds" workflow finishes. A push made by the
# built-in GITHUB_TOKEN does not trigger `on: push`, so we hang off the other
# workflow's completion instead. Manual runs are also allowed.
on:
  workflow_run:
    workflows: ["Update Feeds"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Never run two Pages deploys at once; let the newest win.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    # Deploy only when the feed update succeeded (or on a manual run).
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build site
        env:
          SITE_URL: ${{ steps.pages.outputs.base_url }}
        run: python3 build_site.py

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v5
