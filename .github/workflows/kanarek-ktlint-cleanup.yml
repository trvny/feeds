name: Format Kanarek feature branch

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  format:
    if: github.head_ref == 'feat/kanarek-favorites-widget-controls' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: feat/kanarek-favorites-widget-controls
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Download ktlint
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          asset_url=$(python - <<'PY'
          import json
          import os
          import urllib.request

          request = urllib.request.Request(
              'https://api.github.com/repos/pinterest/ktlint/releases/latest',
              headers={
                  'Accept': 'application/vnd.github+json',
                  'Authorization': f"Bearer {os.environ['GH_TOKEN']}",
                  'X-GitHub-Api-Version': '2022-11-28',
              },
          )
          with urllib.request.urlopen(request) as response:
              release = json.load(response)
          matches = [asset['browser_download_url'] for asset in release['assets'] if asset['name'] == 'ktlint']
          if len(matches) != 1:
              raise SystemExit(f'Expected one ktlint asset, found {len(matches)}')
          print(matches[0])
          PY
          )
          curl --fail --location --silent --show-error "$asset_url" --output ktlint
          chmod +x ktlint

      - name: Format changed Kotlin files
        run: |
          ./ktlint -F \
            kanarek/app/src/main/java/com/kanarek/data/SettingsStore.kt \
            kanarek/app/src/main/java/com/kanarek/ui/PlayerScreen.kt \
            kanarek/app/src/main/java/com/kanarek/ui/ReaderScreen.kt \
            kanarek/app/src/main/java/com/kanarek/widget/KanarekWidgetProvider.kt \
            kanarek/app/src/main/java/com/kanarek/widget/WidgetActionReceiver.kt
          rm .github/workflows/kanarek-ktlint-cleanup.yml
          git diff --check

      - name: Commit formatting
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "style(kanarek): format favorites and widget changes"
          git push origin HEAD:feat/kanarek-favorites-widget-controls
