name: Release
on: # yamllint disable-line rule:truthy
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: kanarek
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: "9.6.0"
          cache-disabled: true # release build must not trust a poisonable cache

      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version 9.6.0

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Publish release with APK
        uses: softprops/action-gh-release@v3
        with:
          files: kanarek/app/build/outputs/apk/debug/*.apk
          generate_release_notes: true
