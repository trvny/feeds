name: Release
on: # yamllint disable-line rule:truthy
  push:
    tags: ["kanarek-v*"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true  

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: kanarek
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      # See Android CI: compileSdk 37 resolves to this SDK platform, which is
      # not guaranteed to be present on GitHub-hosted runners.
      - name: Install Android SDK platform
        run: sdkmanager "platforms;android-37.0" "build-tools;36.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: "9.6.0"
          cache-disabled: true # release build must not trust a poisonable cache

      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version 9.6.0

      - name: Decode release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::error::KEYSTORE_BASE64 secret is not set — cannot produce a signed release APK."
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.jks"

      - name: Build release APK
        env:
          KEYSTORE_FILE: ${{ runner.temp }}/release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --stacktrace

      - name: Rename APK to kanarek-<version>
        run: |
          v="${GITHUB_REF_NAME#kanarek-v}"                          # kanarek-v1.2.0 -> 1.2.0
          [ "$v" = "$GITHUB_REF_NAME" ] && v="dev-${GITHUB_SHA::7}"  # dispatch / no tag
          mv app/build/outputs/apk/play/release/app-play-release.apk \
             "app/build/outputs/apk/play/release/kanarek-${v}.apk"
          mv app/build/outputs/apk/foss/release/app-foss-release.apk \
             "app/build/outputs/apk/foss/release/kanarek-${v}-foss.apk"

      - name: Publish release with APK
        uses: softprops/action-gh-release@v3
        with:
          files: kanarek/app/build/outputs/apk/*/release/kanarek-*.apk
          generate_release_notes: true
