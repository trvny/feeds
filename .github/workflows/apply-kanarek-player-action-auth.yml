name: Apply Kanarek player action authentication

on:
  push:
    branches: [fix/kanarek-hardening-and-stability]
    paths: [.github/workflows/apply-kanarek-player-action-auth.yml]

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: fix/kanarek-hardening-and-stability
          fetch-depth: 0

      - name: Require the app-private token for custom service actions
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path("kanarek/app/src/main/java/com/kanarek/player/PlayerService.kt")
          text = path.read_text()
          old = '''        when (intent?.action) {
            ACTION_TOGGLE -> togglePlayPause()
            ACTION_NEXT -> next()
            ACTION_PREV -> previous()
        }
'''
          new = '''        when (intent?.action) {
            ACTION_TOGGLE -> if (PlayerActionAuth.accepts(this, intent)) togglePlayPause()
            ACTION_NEXT -> if (PlayerActionAuth.accepts(this, intent)) next()
            ACTION_PREV -> if (PlayerActionAuth.accepts(this, intent)) previous()
        }
'''
          if text.count(old) != 1:
              raise SystemExit(f"expected one PlayerService action block, found {text.count(old)}")
          path.write_text(text.replace(old, new, 1))
          PY

      - name: Commit source patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add kanarek/app/src/main/java/com/kanarek/player/PlayerService.kt
          git commit -m "kanarek: authenticate custom PlayerService actions"
          git push origin HEAD:fix/kanarek-hardening-and-stability
