---
name: Lint

on: # yamllint disable-line rule:truthy
  push:
    branches: [main]
    paths-ignore:
      - "feedseek/feeds/**"
      - "feedseek/cache/**"
  pull_request: null

permissions: {}
concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: MegaLinter
    runs-on: ubuntu-latest

    permissions:
      contents: read
      issues: write
      pull-requests: write
      checks: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: MegaLinter
        uses: oxsecurity/megalinter/flavors/python@v9
        env:
          MEGALINTER_CONFIG: .github/linters/.mega-linter.yml
          VALIDATE_ALL_CODEBASE: >-
            ${{
              github.event_name == 'push' &&
              contains(fromJSON('["refs/heads/main", "refs/heads/master"]'), github.ref)
            }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLY_FIXES_EVENT: none
          APPLY_FIXES_MODE: commit

      - name: Archive MegaLinter reports
        if: success() || failure()
        uses: actions/upload-artifact@v7
        with:
          name: MegaLinter reports
          include-hidden-files: "true"
          path: |
            megalinter-reports
            mega-linter.log

  feedseek-tests:
    name: Feedseek tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Install uv and Python
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
          cache-python: true

      - name: Install dependencies
        working-directory: feedseek
        run: uv sync

      - name: Run unit tests
        working-directory: feedseek
        run: uv run python -m unittest discover -s tests

      - name: Validate committed feed artifacts
        working-directory: feedseek
        run: uv run feed_generators/validate_feeds.py

  secret-scan:
    name: Trufflehog
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Secret Scanning
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --results=verified,unknown
