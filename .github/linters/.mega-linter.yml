# MegaLinter configuration - replaces Super-linter in .github/workflows/lint.yml
# Docs: https://megalinter.io/latest/config-file/
---
# Auto-fix is applied in-container and surfaced as fixed copies under
# megalinter-reports/updated_sources/ in the uploaded artifact. There is NO
# writeback: .github/workflows/lint.yml keeps APPLY_FIXES_EVENT: none, so
# nothing is committed or pushed - safe to pull the artifact and apply locally.
APPLY_FIXES: all
FLAVOR_SUGGESTIONS: false
# REPOSITORY: secret/SAST scanning (gitleaks, trivy, semgrep, checkov, ...) -
#   already covered by the separate Trufflehog job in lint.yml
# SPELL: cspell - mixed PL/EN content across feeds.yaml, docs, and cached
#   post titles produces mostly noise
# COPYPASTE: jscpd - not useful across independent per-source generators
DISABLE:
  - REPOSITORY
  - SPELL
  - COPYPASTE

# PYTHON_PYRIGHT: redundant with PYTHON_MYPY here - both just flag the same
#   BeautifulSoup return-type unions (str | AttributeValueList | None) across
#   the same files. Keeping one type checker instead of reporting it twice.
DISABLE_LINTERS:
  - PYTHON_PYRIGHT

# Keep linter config files in .github/linters/ (same convention as
# .github/linters/.mega-linter.yml itself), not repo root. Both point at an
# explicit path via each linter's *_CONFIG_FILE (detekt's default config
# filename differs, so pointing RULES_PATH at the dir alone isn't enough).
MARKDOWN_MARKDOWNLINT_CONFIG_FILE: ".github/linters/.markdownlint.yml"
PYTHON_BANDIT_CONFIG_FILE: ".github/linters/.bandit.yml"
KOTLIN_DETEKT_CONFIG_FILE: ".github/linters/detekt-config.yml"
# HTML_DJLINT: reader.html is a single-file, no-SEO utility page with a few
#   intentional inline styles (JS-toggled display:none, small one-off tweaks).
#   Ignore H021 (inline styles), H030/H031 (meta description/keywords) as noise
#   for this context; djlint still blocks on real structural issues. Pass these
#   directly because current djlint removed the -c config-file option used by
#   MegaLinter's HTML_DJLINT_CONFIG_FILE integration.
HTML_DJLINT_ARGUMENTS:
  - "--profile=html"
  - "--ignore=H021,H030,H031"
# HTML_HTMLHINT: copy of MegaLinter's default ruleset with id-class-value
#   turned off - reader.html uses idiomatic camelCase ids referenced by its
#   in-file JS (getElementById), not dash-case. All other checks kept.
HTML_HTMLHINT_CONFIG_FILE: ".github/linters/.htmlhintrc"
# ACTION_ZIZMOR: run offline (no GitHub API -> avoids the 401 ref-confusion
#   crash that aborted the whole audit) and fail CI only on low+ severity.
#   unpinned-uses is waived to ref-pin in .github/zizmor.yml; artipacked and
#   dangerous-triggers are waived inline where a job legitimately needs
#   persisted creds or a workflow_run trigger. Real medium+ findings
#   (excessive-permissions, cache-poisoning, bot-conditions) were fixed.
ACTION_ZIZMOR_ARGUMENTS:
  - "--offline"
  - "--min-severity=low"

# detekt needs --build-upon-default-config or a custom config file replaces
# the defaults instead of overriding them - see .github/linters/detekt-config.yml.
KOTLIN_DETEKT_ARGUMENTS:
  - "--build-upon-default-config"

# PYTHON_PYLINT / PYTHON_MYPY / KOTLIN_DETEKT: first full run found real
#   findings that are minor and pre-existing rather than fresh breakage -
#   4 pylint complexity notes, 51 mypy findings (BeautifulSoup's loosely
#   typed .text/.get() unions across 13 scrapers), 9 detekt LongMethod/
#   CyclomaticComplexMethod/NestedBlockDepth on a few large Compose screens
#   and two parsers. Left as real, non-blocking signal rather than
#   suppressed - worth chipping away at, not urgent.
DISABLE_ERRORS_LINTERS:
  - PYTHON_PYLINT
  - PYTHON_MYPY
  - KOTLIN_DETEKT

FILTER_REGEX_EXCLUDE: "(feedseek/feeds/|feedseek/cache/|kanarek/gradle/wrapper/|kanarek/app/lint-baseline\\.xml|assets/icons/|package-lock\\.json)"
