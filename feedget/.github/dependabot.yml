---
version: 2
updates:
  # GitHub Actions referenced by the workflows in .github/workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      actions:
        patterns: ["*"]
    labels:
      - "dependencies"
      - "github-actions"

  # Android app — Gradle version catalog (gradle/libs.versions.toml)
  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      androidx:
        patterns: ["androidx.*"]
      kotlin:
        patterns: ["org.jetbrains.kotlin*", "org.jetbrains.kotlinx*"]
    labels:
      - "dependencies"
      - "gradle"

  # Cloudflare Worker — npm project lives in /worker
  - package-ecosystem: "npm"
    directory: "/worker"
    schedule:
      interval: "weekly"
    groups:
      worker:
        patterns: ["*"]
    labels:
      - "dependencies"
      - "npm"
