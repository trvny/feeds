name: Worker CI

on:
  push:
    branches: [main]
    paths: ['worker/**']
  pull_request:
    branches: [main]
    paths: ['worker/**']
concurrency:
  group: worker-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
      - run: npm install
      - run: npm run typecheck
      - run: npm test
