name: Worker CI

on:
  push:
    branches: [ main ]
    paths: [ 'worker/**' ]
  pull_request:
    branches: [ main ]
    paths: [ 'worker/**' ]

jobs:
  typecheck:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm run typecheck
