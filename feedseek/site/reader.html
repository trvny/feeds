<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>feeds</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16x16.png">
<link rel="icon" type="image/png" sizes="96x96" href="icons/favicon-96x96.png">
<link rel="shortcut icon" href="favicon.ico">
<link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon.png">
<link rel="mask-icon" href="favicon.svg" color="#d6541a">
<link rel="manifest" href="site.webmanifest">
<meta name="theme-color" content="#d6541a">
<style>
  :root{
    --bg:#0f0e0d;--card:#1a1817;--line:#2a2725;--fg:#ece8e3;
    --mut:#8c857c;--accent:#d6541a;--accent-dim:#3a221541;
  }
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--bg);color:var(--fg);
    font:16px/1.45 system-ui,-apple-system,"Segoe UI",Roboto,sans-serif}
  a{color:inherit;text-decoration:none}
  header{position:sticky;top:0;z-index:5;background:var(--bg);
    padding:env(safe-area-inset-top) 16px 8px;border-bottom:1px solid var(--line)}
  .bar{display:flex;align-items:baseline;gap:10px;padding-top:12px}
  .bar h1{font-size:20px;margin:0;font-weight:800;letter-spacing:-.02em}
  .bar h1 b{color:var(--accent)}
  .bar .n{color:var(--mut);font-size:13px;margin-right:auto}
  .bar button{background:none;border:none;color:var(--mut);font-size:20px;
    padding:4px 6px;cursor:pointer}
  .bar button:disabled{opacity:.45;cursor:default}
  .chips{display:flex;gap:8px;overflow-x:auto;padding:10px 0 2px;
    scrollbar-width:none}.chips::-webkit-scrollbar{display:none}
  .chip{flex:0 0 auto;border:1px solid var(--line);background:var(--card);
    color:var(--mut);border-radius:999px;padding:5px 12px;font-size:13px;
    white-space:nowrap;cursor:pointer}
  .chip.on{background:var(--accent-dim);border-color:var(--accent);color:var(--fg)}
  main{padding:8px 16px 40px;max-width:760px;margin:0 auto}
  .item{display:flex;gap:12px;padding:13px 0;border-bottom:1px solid var(--line)}
  .itxt{flex:1;min-width:0}
  .thumb{width:84px;height:84px;flex:0 0 auto;object-fit:cover;border-radius:8px;
    background:var(--line);margin-top:2px}
  .item .src{display:flex;align-items:center;gap:6px;font-size:11px;
    font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--accent)}
  .fav{width:14px;height:14px;border-radius:3px;flex:0 0 auto;
    background:var(--line);object-fit:cover}
  .item .t{font-size:16px;font-weight:600;margin:3px 0 2px;letter-spacing:-.01em}
  .item .desc{font-size:13px;color:var(--mut);line-height:1.4;margin:2px 0 3px;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .item .meta{font-size:12px;color:var(--mut)}
  .msg{color:var(--mut);text-align:center;padding:48px 16px;font-size:14px}
  .warn{color:var(--mut);font-size:12px;text-align:center;padding:10px}
  dialog{background:var(--card);color:var(--fg);border:1px solid var(--line);
    border-radius:14px;max-width:420px;width:92%;padding:18px}
  dialog::backdrop{background:#000a}
  dialog h2{margin:0 0 12px;font-size:16px}
  dialog label{display:block;font-size:12px;color:var(--mut);margin:12px 0 4px}
  dialog label.tog{display:flex;align-items:center;gap:8px;margin-top:14px;
    font-size:13px;color:var(--fg);cursor:pointer}
  dialog label.tog input[type=checkbox]{width:auto;accent-color:var(--accent)}
  dialog input[type=text]{width:100%;background:var(--bg);border:1px solid var(--line);
    color:var(--fg);border-radius:8px;padding:9px;font-size:13px}
  dialog .row{display:flex;gap:8px;margin-top:16px;justify-content:flex-end}
  dialog button{border:1px solid var(--line);background:var(--bg);color:var(--fg);
    border-radius:8px;padding:8px 14px;font-size:14px;cursor:pointer}
  dialog button.p{background:var(--accent);border-color:var(--accent)}
  #manageList{max-height:170px;overflow:auto;margin-top:4px}
  .mrow{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--line)}
  .mt{flex:1;min-width:0;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .mx{background:none;border:none;color:var(--mut);font-size:14px;cursor:pointer;padding:2px 6px}
  .mx:hover{color:var(--accent)}
  .addrow{display:flex;gap:6px;margin-top:8px}
  .addrow input[type=text]{width:auto}
  .addrow #addTitle{flex:0 0 38%}
  .addrow #addUrl{flex:1}
  .addrow button{flex:0 0 auto}
  .bar2{height:2px;background:var(--accent);width:0;transition:width .2s;
    position:sticky;top:0;z-index:6}
</style>
</head>
<body>
<div class="bar2" id="prog"></div>
<header>
  <div class="bar">
    <h1>feed<b>·</b>seek</h1>
    <span class="n" id="count"></span>
    <button id="refresh" title="Refresh" aria-label="Refresh">↻</button>
    <button id="gear" title="Settings" aria-label="Settings">⚙</button>
  </div>
  <div class="chips" id="chips"></div>
</header>
<main id="list"><div class="msg">Loading…</div></main>

<dialog id="settings">
  <h2>Settings</h2>
  <label>CORS proxy prefix (ends with <code>?url=</code>)</label>
  <input type="text" id="proxy" placeholder="https://feeds-proxy.you.workers.dev/?url=">
  <label>OPML URL</label>
  <input type="text" id="opml" placeholder="../subscriptions.opml">
  <div class="row" style="justify-content:flex-start;flex-wrap:wrap;margin-top:10px">
    <button type="button" id="importOpml">Import file…</button>
    <button type="button" id="exportOpml">Export file</button>
    <button type="button" id="clearImport" style="display:none">Remove import</button>
  </div>
  <input type="file" id="opmlFile" accept=".opml,.xml,text/xml" style="display:none">
  <div id="importStatus" style="font-size:12px;color:var(--mut);padding-top:6px"></div>
  <label>Feeds</label>
  <div id="manageList"></div>
  <div class="addrow">
    <input type="text" id="addTitle" placeholder="title">
    <input type="text" id="addUrl" placeholder="https://…/feed.xml">
    <button type="button" id="addFeed">Add</button>
  </div>
  <label class="tog">
    <input type="checkbox" id="showfavs">
    Show favicons <span style="color:var(--mut);font-size:11px">(DuckDuckGo / Google CDN)</span>
  </label>
  <label class="tog">
    <input type="checkbox" id="showthumbs">
    Show thumbnails <span style="color:var(--mut);font-size:11px">(from feed media)</span>
  </label>
  <div class="row">
    <button type="button" id="cancel">Cancel</button>
    <button type="button" class="p" id="save">Save</button>
  </div>
</dialog>

<script src="reader.js"></script>
</body>
</html>
