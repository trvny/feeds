<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>feeds</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%2024%2024'%3E%3Crect%20width='24'%20height='24'%20rx='5'%20fill='%23d6541a'/%3E%3Ccircle%20cx='7'%20cy='17'%20r='2'%20fill='%23fff'/%3E%3Cpath%20d='M5%2011a8%208%200%200%201%208%208h2.6A10.6%2010.6%200%200%200%205%208.4z'%20fill='%23fff'/%3E%3Cpath%20d='M5%205a14%2014%200%200%201%2014%2014h2.6A16.6%2016.6%200%200%200%205%202.4z'%20fill='%23fff'/%3E%3C/svg%3E">
<style>
  :root{
    --bg:#0f0e0d;--card:#1a1817;--line:#2a2725;--fg:#ece8e3;
    --mut:#8c857c;--accent:#d6541a;--accent-dim:#3a221541;
  }
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--bg);color:var(--fg);
    font:16px/1.45 system-ui,-apple-system,"Segoe UI",Roboto,sans-serif}
  a{color:inherit;text-decoration:none}
  header{position:sticky;top:0;z-index:5;background:var(--bg);
    padding:env(safe-area-inset-top) 16px 8px;border-bottom:1px solid var(--line)}
  .bar{display:flex;align-items:baseline;gap:10px;padding-top:12px}
  .bar h1{font-size:20px;margin:0;font-weight:800;letter-spacing:-.02em}
  .bar h1 b{color:var(--accent)}
  .bar .n{color:var(--mut);font-size:13px;margin-right:auto}
  .bar button{background:none;border:none;color:var(--mut);font-size:20px;
    padding:4px 6px;cursor:pointer}
  .chips{display:flex;gap:8px;overflow-x:auto;padding:10px 0 2px;
    scrollbar-width:none}.chips::-webkit-scrollbar{display:none}
  .chip{flex:0 0 auto;border:1px solid var(--line);background:var(--card);
    color:var(--mut);border-radius:999px;padding:5px 12px;font-size:13px;
    white-space:nowrap;cursor:pointer}
  .chip.on{background:var(--accent-dim);border-color:var(--accent);color:var(--fg)}
  main{padding:8px 16px 40px;max-width:760px;margin:0 auto}
  .item{display:flex;gap:12px;padding:13px 0;border-bottom:1px solid var(--line)}
  .itxt{flex:1;min-width:0}
  .thumb{width:84px;height:84px;flex:0 0 auto;object-fit:cover;border-radius:8px;
    background:var(--line);margin-top:2px}
  .item .src{display:flex;align-items:center;gap:6px;font-size:11px;
    font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--accent)}
  .fav{width:14px;height:14px;border-radius:3px;flex:0 0 auto;
    background:var(--line);object-fit:cover}
  .item .t{font-size:16px;font-weight:600;margin:3px 0 2px;letter-spacing:-.01em}
  .item .desc{font-size:13px;color:var(--mut);line-height:1.4;margin:2px 0 3px;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .item .meta{font-size:12px;color:var(--mut)}
  .msg{color:var(--mut);text-align:center;padding:48px 16px;font-size:14px}
  .warn{color:var(--mut);font-size:12px;text-align:center;padding:10px}
  dialog{background:var(--card);color:var(--fg);border:1px solid var(--line);
    border-radius:14px;max-width:420px;width:92%;padding:18px}
  dialog::backdrop{background:#000a}
  dialog h2{margin:0 0 12px;font-size:16px}
  dialog label{display:block;font-size:12px;color:var(--mut);margin:12px 0 4px}
  dialog label.tog{display:flex;align-items:center;gap:8px;margin-top:14px;
    font-size:13px;color:var(--fg);cursor:pointer}
  dialog label.tog input[type=checkbox]{width:auto;accent-color:var(--accent)}
  dialog input[type=text]{width:100%;background:var(--bg);border:1px solid var(--line);
    color:var(--fg);border-radius:8px;padding:9px;font-size:13px}
  dialog .row{display:flex;gap:8px;margin-top:16px;justify-content:flex-end}
  dialog button{border:1px solid var(--line);background:var(--bg);color:var(--fg);
    border-radius:8px;padding:8px 14px;font-size:14px;cursor:pointer}
  dialog button.p{background:var(--accent);border-color:var(--accent)}
  #manageList{max-height:170px;overflow:auto;margin-top:4px}
  .mrow{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--line)}
  .mt{flex:1;min-width:0;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .mx{background:none;border:none;color:var(--mut);font-size:14px;cursor:pointer;padding:2px 6px}
  .mx:hover{color:var(--accent)}
  .addrow{display:flex;gap:6px;margin-top:8px}
  .addrow input[type=text]{width:auto}
  .addrow #addTitle{flex:0 0 38%}
  .addrow #addUrl{flex:1}
  .addrow button{flex:0 0 auto}
  .bar2{height:2px;background:var(--accent);width:0;transition:width .2s;
    position:sticky;top:0;z-index:6}
</style>
</head>
<body>
<div class="bar2" id="prog"></div>
<header>
  <div class="bar">
    <h1>feed<b>·</b>seek</h1>
    <span class="n" id="count"></span>
    <button id="refresh" title="Refresh">↻</button>
    <button id="gear" title="Settings">⚙</button>
  </div>
  <div class="chips" id="chips"></div>
</header>
<main id="list"><div class="msg">Loading…</div></main>

<dialog id="settings">
  <h2>Settings</h2>
  <label>CORS proxy prefix (ends with <code>?url=</code>)</label>
  <input type="text" id="proxy" placeholder="https://feeds-proxy.you.workers.dev/?url=">
  <label>OPML URL</label>
  <input type="text" id="opml" placeholder="../subscriptions.opml">
  <div class="row" style="justify-content:flex-start;flex-wrap:wrap;margin-top:10px">
    <button type="button" id="importOpml">Import file…</button>
    <button type="button" id="exportOpml">Export file</button>
    <button type="button" id="clearImport" style="display:none">Remove import</button>
  </div>
  <input type="file" id="opmlFile" accept=".opml,.xml,text/xml" style="display:none">
  <div id="importStatus" style="font-size:12px;color:var(--mut);padding-top:6px"></div>
  <label>Feeds</label>
  <div id="manageList"></div>
  <div class="addrow">
    <input type="text" id="addTitle" placeholder="title">
    <input type="text" id="addUrl" placeholder="https://…/feed.xml">
    <button type="button" id="addFeed">Add</button>
  </div>
  <label class="tog">
    <input type="checkbox" id="showfavs">
    Show favicons <span style="color:var(--mut);font-size:11px">(DuckDuckGo / Google CDN)</span>
  </label>
  <label class="tog">
    <input type="checkbox" id="showthumbs">
    Show thumbnails <span style="color:var(--mut);font-size:11px">(from feed media)</span>
  </label>
  <div class="row">
    <button type="button" id="cancel">Cancel</button>
    <button type="button" class="p" id="save">Save</button>
  </div>
</dialog>

<script>
// ── storage layer ────────────────────────────
const SCHEMA_V = 1;
const NS = 'fs:';
const ls = {
  get: k => { try{ return localStorage.getItem(NS+k); }catch(e){ return null; } },
  set: (k,v) => { try{ localStorage.setItem(NS+k,v); }catch(e){} },
  del: k => { try{ localStorage.removeItem(NS+k); }catch(e){} },
};

// one-time migration of bare keys from the previous version
(function migrate(){
  const oldProxy = localStorage.getItem('proxy');
  const oldOpml  = localStorage.getItem('opml');
  const oldSnap  = localStorage.getItem('snap');
  if(oldProxy || oldOpml){
    try{
      const existing = JSON.parse(ls.get('cfg')||'{}');
      if(oldProxy && !existing.proxy) existing.proxy = oldProxy;
      if(oldOpml  && !existing.opml)  existing.opml  = oldOpml;
      ls.set('cfg', JSON.stringify(existing));
      localStorage.removeItem('proxy');
      localStorage.removeItem('opml');
    }catch(e){}
  }
  if(oldSnap && !ls.get('snap')){
    // migrate as-is; version check below will discard if schema mismatches
    ls.set('snap', oldSnap);
    localStorage.removeItem('snap');
  }
})();

// ── config ────────────────────────────
let savedCfg = {};
try{ savedCfg = JSON.parse(ls.get('cfg')||'{}'); }catch(e){}
const cfg = {
  proxy: savedCfg.proxy || '',
  opml:  savedCfg.opml  || '../subscriptions.opml',
  favs:  savedCfg.favs !== false,  // default on
  thumbs: savedCfg.thumbs !== false,  // default on
};
function saveCfg(){
  ls.set('cfg', JSON.stringify({proxy:cfg.proxy, opml:cfg.opml, favs:cfg.favs, thumbs:cfg.thumbs}));
}

// ── subscription overlay (per-feed add/remove on top of the base OPML) ──
// { removed:[xmlUrl…], added:[{title,xmlUrl}…] } — the base OPML keeps
// auto-updating; this only layers the user's local edits on top.
function loadOverlay(){
  try{
    const o = JSON.parse(ls.get('overlay')||'{}');
    return { removed: Array.isArray(o.removed)?o.removed:[],
             added:   Array.isArray(o.added)?o.added:[] };
  }catch(e){ return {removed:[], added:[]}; }
}
function saveOverlay(){ ls.set('overlay', JSON.stringify({removed:overlay.removed, added:overlay.added})); }
let overlay = loadOverlay();

// ── snapshot (feed cache) ────────────────────────
function loadSnap(){
  try{
    const s = JSON.parse(ls.get('snap')||'null');
    if(!s || s._v !== SCHEMA_V) return null;
    return s;
  }catch(e){ return null; }
}
function saveSnap(items){
  try{
    ls.set('snap', JSON.stringify({_v:SCHEMA_V, t:Date.now(), items}));
  }catch(e){
    if(e instanceof DOMException && e.name==='QuotaExceededError'){
      const pruned = items.slice(0, Math.floor(items.length/2));
      try{ ls.set('snap', JSON.stringify({_v:SCHEMA_V, t:Date.now(), items:pruned})); }catch(e2){}
    }
  }
}

// ── favicon cache ──────────────────────────
// values: 'ok' (DDG worked), 'g' (Google worked), 'x' (both failed)
const RSS_FALLBACK = "data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%2024%2024'%3E%3Crect%20width='24'%20height='24'%20rx='5'%20fill='%23d6541a'/%3E%3Ccircle%20cx='7'%20cy='17'%20r='2'%20fill='%23fff'/%3E%3Cpath%20d='M5%2011a8%208%200%200%201%208%208h2.6A10.6%2010.6%200%200%200%205%208.4z'%20fill='%23fff'/%3E%3Cpath%20d='M5%205a14%2014%200%200%201%2014%2014h2.6A16.6%2016.6%200%200%200%205%202.4z'%20fill='%23fff'/%3E%3C/svg%3E";
const FAVS_MAX = 500;
let favsCache = {};
try{ favsCache = JSON.parse(ls.get('favs')||'{}'); }catch(e){}
function saveFavsCache(){
  const keys = Object.keys(favsCache);
  if(keys.length > FAVS_MAX){
    const pruned = {};
    keys.slice(-FAVS_MAX).forEach(k => pruned[k] = favsCache[k]);
    favsCache = pruned;
  }
  ls.set('favs', JSON.stringify(favsCache));
}
// global handlers referenced from rendered HTML
window.favOk  = el => { favsCache[el.dataset.h]='ok'; saveFavsCache(); };
window.favErr = el => {
  favsCache[el.dataset.h]='fail-ddg';
  el.onerror = () => { favsCache[el.dataset.h]='x'; saveFavsCache(); el.onerror=null; el.src=RSS_FALLBACK; };
  el.onload  = () => { favsCache[el.dataset.h]='g'; saveFavsCache(); };
  el.src = `https://www.google.com/s2/favicons?domain=${encodeURIComponent(el.dataset.h)}&sz=32`;
};

function favImg(h){
  if(!cfg.favs || !h) return '';
  const st = favsCache[h];
  if(st==='x') return `<img class="fav" loading="lazy" src="${RSS_FALLBACK}">`;
  let src, extra='';
  if(st==='g'){
    src = `https://www.google.com/s2/favicons?domain=${encodeURIComponent(h)}&sz=32`;
    extra = `onload="favOk(this)"`;
  } else {
    src = `https://icons.duckduckgo.com/ip3/${h}.ico`;
    extra = `onload="favOk(this)" onerror="favErr(this)"`;
  }
  return `<img class="fav" loading="lazy" data-h="${h}" src="${src}" ${extra}>`;
}

// ── feed parsing ───────────────────────────
const $ = s => document.querySelector(s);
const prox = u => cfg.proxy ? cfg.proxy + encodeURIComponent(u) : u;
let ITEMS = [], FILTER = null, FAILED = [], SOURCES = [], LOADED = 0, FEEDS = [];

function txt(el,...names){
  for(const n of names){
    const c = [...el.children].find(x => x.tagName.toLowerCase().replace(/^.*:/,'')===n);
    if(c && c.textContent.trim()) return c.textContent.trim();
  }
  return '';
}
function lnk(el){
  for(const c of el.children){
    const t = c.tagName.toLowerCase().replace(/^.*:/,'');
    if(t==='link'){
      const href = c.getAttribute('href');
      if(href && (c.getAttribute('rel')||'alternate')==='alternate') return href;
      if(c.textContent.trim()) return c.textContent.trim();
    }
  }
  return txt(el,'guid');
}
function clean(s){
  if(!s) return '';
  s = s.replace(/<[^>]+>/g,' ').replace(/\s+/g,' ').trim();
  return s.length>180 ? s.slice(0,180).replace(/\s+\S*$/,'')+'…' : s;
}
function host(url){ try{ return new URL(url).hostname; }catch(e){ return ''; } }
function mediaImg(n){
  const kids = n.getElementsByTagName('*');
  const local = e => e.tagName.toLowerCase().replace(/^.*:/,'');
  // 1) media:thumbnail/@url
  for(const e of kids){ if(local(e)==='thumbnail'){ const u=e.getAttribute('url'); if(u) return u; } }
  // 2) media:content that is an image
  for(const e of kids){
    if(local(e)==='content'){
      const t=e.getAttribute('type')||'', m=e.getAttribute('medium')||'', u=e.getAttribute('url');
      if(u && (m==='image'||t.startsWith('image'))) return u;
    }
  }
  // 3) enclosure image
  for(const e of kids){
    if(local(e)==='enclosure'){
      const t=e.getAttribute('type')||'', u=e.getAttribute('url');
      if(u && t.startsWith('image')) return u;
    }
  }
  // 4) first <img> inside the HTML body
  const body = txt(n,'encoded','content','description','summary');
  const m = body && body.match(/<img[^>]+src=["']([^"']+)["']/i);
  return m ? m[1] : '';
}
function parseFeed(xml, source){
  const doc = new DOMParser().parseFromString(xml,'text/xml');
  if(doc.querySelector('parsererror')) throw new Error('bad xml');
  return [...doc.querySelectorAll('item, entry')].map(n=>{
    const d = txt(n,'pubdate','published','updated','date','dc:date');
    const ts = d ? Date.parse(d) : NaN;
    const title = txt(n,'title')||'(untitled)';
    let desc = clean(txt(n,'description','summary','content','encoded'));
    if(desc && desc.toLowerCase()===title.toLowerCase()) desc='';
    return {source, title, desc, url:lnk(n), ts:isNaN(ts)?0:ts, img:mediaImg(n)};
  }).filter(i=>i.title);
}
function rel(ts){
  if(!ts) return '';
  const s=(Date.now()-ts)/1000;
  if(s<3600) return Math.max(1,Math.round(s/60))+'m';
  if(s<86400) return Math.round(s/3600)+'h';
  if(s<604800) return Math.round(s/86400)+'d';
  return new Date(ts).toLocaleDateString(undefined,{month:'short',day:'numeric'});
}

// ── OPML helpers ───────────────────────────
function opmlOutlineCount(text){
  try{
    const src = String(text ?? '');
    if (/<\s*script\b|<\s*iframe\b|\bon\w+\s*=|javascript:/i.test(src)) return 0;
    const matches = src.match(/<\s*outline\b[^>]*\bxmlUrl\s*=\s*(?:"[^"]*"|'[^']*')/gi);
    return matches ? matches.length : 0;
  }
  catch(e){ return 0; }
}
function buildOpml(feeds){
  const esc2 = s => String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const body = feeds.map(f=>
    `    <outline type="rss" text="${esc2(f.title)}" title="${esc2(f.title)}" xmlUrl="${esc2(f.xmlUrl)}"/>`
  ).join('\n');
  return `<?xml version="1.0" encoding="UTF-8"?>\n<opml version="2.0">\n  <head><title>feed·seek subscriptions</title></head>\n  <body>\n${body}\n  </body>\n</opml>\n`;
}

// ── data loading ──────────────────────────
async function loadFeed(f){
  const r = await fetch(prox(f.xmlUrl),{redirect:'follow'});
  if(!r.ok) throw new Error(r.status);
  return parseFeed(await r.text(), f.title);
}
async function run(){
  if(!ITEMS.length) $('#list').innerHTML='<div class="msg">Loading…</div>';
  ITEMS=[]; FAILED=[];
  let feeds;
  const customOpml = ls.get('customOpml');
  try{
    const opmlText = customOpml || await (await fetch(cfg.opml,{cache:'no-cache'})).text();
    const doc = new DOMParser().parseFromString(opmlText,'text/xml');
    if(doc.querySelector('parsererror')) throw new Error('bad xml');
    feeds = [...doc.querySelectorAll('outline[xmlUrl]')].map(o=>({
      title: o.getAttribute('title')||o.getAttribute('text')||'feed',
      xmlUrl: o.getAttribute('xmlUrl'),
    }));
  }catch(e){
    $('#list').innerHTML = customOpml
      ? '<div class="msg">Imported OPML is invalid.</div>'
      : '<div class="msg">No <code>subscriptions.opml</code> yet.</div>';
    return;
  }
  // per-feed overlay: drop removed, append user-added (base OPML stays live)
  const rm = new Set(overlay.removed);
  feeds = feeds.filter(f=>!rm.has(f.xmlUrl));
  const have = new Set(feeds.map(f=>f.xmlUrl));
  for(const a of overlay.added){
    if(a.xmlUrl && !have.has(a.xmlUrl)){
      feeds.push({title:a.title||a.xmlUrl, xmlUrl:a.xmlUrl}); have.add(a.xmlUrl);
    }
  }
  if(!feeds.length){
    $('#list').innerHTML='<div class="msg">No feeds in the OPML yet.</div>';
    return;
  }
  FEEDS = feeds;
  let done=0;
  const results = await Promise.allSettled(feeds.map(async f=>{
    try{ return await loadFeed(f); }
    finally{ done++; $('#prog').style.width=(done/feeds.length*100)+'%'; }
  }));
  results.forEach((res,i)=>{
    if(res.status==='fulfilled') ITEMS.push(...res.value);
    else FAILED.push(feeds[i].title);
  });
  const seen=new Set();
  ITEMS = ITEMS.filter(i=>i.url&&!seen.has(i.url)&&seen.add(i.url))
               .sort((a,b)=>b.ts-a.ts);
  // every source that returned at least one item -- computed BEFORE the view
  // cap so low-frequency feeds still get a chip and are counted.
  SOURCES = [...new Set(ITEMS.map(i=>i.source))].sort();
  LOADED = feeds.length - FAILED.length;
  ITEMS = ITEMS.slice(0,250);
  saveSnap(ITEMS);
  setTimeout(()=>$('#prog').style.width='0',300);
  render();
}

// ── rendering ──────────────────────────
const esc = s => s.replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
function render(){
  const sources=SOURCES.length?SOURCES:[...new Set(ITEMS.map(i=>i.source))].sort();
  $('#chips').innerHTML=['All',...sources].map(s=>
    `<button class="chip${(FILTER===null&&s==='All')||FILTER===s?' on':''}" data-s="${s}">${s}</button>`
  ).join('');
  const shown=FILTER?ITEMS.filter(i=>i.source===FILTER):ITEMS;
  $('#count').textContent=`${shown.length} items · ${LOADED||sources.length} feeds`+(FAILED.length?` · ${FAILED.length} failed`:'');
  let html=shown.map(i=>{
    const h=host(i.url);
    const desc=i.desc?`<div class="desc">${esc(i.desc)}</div>`:'';
    const thumb=(cfg.thumbs&&i.img)
      ? `<img class="thumb" loading="lazy" src="${esc(i.img).replace(/"/g,'&quot;')}" onerror="this.remove()">`
      : '';
    return `<a class="item" href="${i.url}" target="_blank" rel="noopener">
      <div class="itxt">
        <div class="src">${favImg(h)}${i.source}</div>
        <div class="t">${esc(i.title)}</div>
        ${desc}
        <div class="meta">${rel(i.ts)}</div>
      </div>
      ${thumb}
    </a>`;
  }).join('');
  if(FAILED.length) html+=`<div class="warn">⚠ ${FAILED.length} feed(s) failed${cfg.proxy?'':' — set a CORS proxy in ⚙'}</div>`;
  $('#list').innerHTML=html||'<div class="msg">Nothing here.</div>';
}

// ── events ─────────────────────────
document.addEventListener('click',e=>{
  const c=e.target.closest('.chip');
  if(c){ FILTER=c.dataset.s==='All'?null:c.dataset.s; render(); }
});
$('#refresh').onclick=run;
$('#gear').onclick=()=>{
  $('#proxy').value=cfg.proxy;
  $('#opml').value=cfg.opml;
  $('#showfavs').checked=cfg.favs;
  $('#showthumbs').checked=cfg.thumbs;
  const custom=ls.get('customOpml');
  $('#importStatus').textContent = custom
    ? `Using imported file (${opmlOutlineCount(custom)} feeds) instead of the OPML URL.`
    : '';
  $('#clearImport').style.display = custom ? '' : 'none';
  renderManage();
  $('#settings').showModal();
};
$('#importOpml').onclick=()=>$('#opmlFile').click();
$('#opmlFile').onchange=async e=>{
  const file=e.target.files[0];
  e.target.value='';
  if(!file) return;
  const text=await file.text();
  const n=opmlOutlineCount(text);
  if(!n){ $('#importStatus').textContent='Invalid OPML file — no feeds found.'; return; }
  ls.set('customOpml', text);
  $('#importStatus').textContent=`Imported ${file.name} (${n} feeds) — using this instead of the OPML URL.`;
  $('#clearImport').style.display='';
  $('#settings').close();
  run();
};
$('#exportOpml').onclick=()=>{
  if(!FEEDS.length){ $('#importStatus').textContent='No feeds loaded yet — refresh first.'; return; }
  const blob = new Blob([buildOpml(FEEDS)], {type:'text/x-opml+xml'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href=url; a.download='subscriptions.opml';
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
};
$('#clearImport').onclick=()=>{
  ls.del('customOpml');
  $('#importStatus').textContent='';
  $('#clearImport').style.display='none';
  $('#settings').close();
  run();
};
function renderManage(){
  const el=$('#manageList');
  if(!FEEDS.length){
    el.innerHTML='<div style="color:var(--mut);font-size:12px;padding:6px 0">No feeds loaded — hit ↻ first.</div>';
    return;
  }
  el.innerHTML=FEEDS.map((f,i)=>
    `<div class="mrow"><span class="mt">${esc(f.title||f.xmlUrl)}</span>`+
    `<button type="button" class="mx" data-i="${i}" title="Remove">✕</button></div>`
  ).join('');
}
$('#manageList').onclick=e=>{
  const b=e.target.closest('.mx'); if(!b) return;
  const f=FEEDS[+b.dataset.i]; if(!f) return;
  if(overlay.added.some(a=>a.xmlUrl===f.xmlUrl))
    overlay.added=overlay.added.filter(a=>a.xmlUrl!==f.xmlUrl);
  else if(!overlay.removed.includes(f.xmlUrl))
    overlay.removed.push(f.xmlUrl);
  FEEDS.splice(+b.dataset.i,1);
  saveOverlay(); renderManage(); run();
};
$('#addFeed').onclick=()=>{
  const t=$('#addTitle').value.trim(), u=$('#addUrl').value.trim();
  if(!u) return;
  if(!/^https?:\/\//i.test(u)){ $('#importStatus').textContent='Feed URL must start with http(s)://'; return; }
  if(FEEDS.some(f=>f.xmlUrl===u)){ $('#addTitle').value=''; $('#addUrl').value=''; return; }
  overlay.removed=overlay.removed.filter(x=>x!==u);
  overlay.added.push({title:t||u, xmlUrl:u});
  saveOverlay();
  FEEDS.push({title:t||u, xmlUrl:u});
  $('#addTitle').value=''; $('#addUrl').value='';
  $('#importStatus').textContent='';
  renderManage(); run();
};
$('#cancel').onclick=()=>$('#settings').close();
$('#save').onclick=()=>{
  cfg.proxy=$('#proxy').value.trim();
  cfg.opml=$('#opml').value.trim()||'../subscriptions.opml';
  cfg.favs=$('#showfavs').checked;
  cfg.thumbs=$('#showthumbs').checked;
  saveCfg();
  $('#settings').close();
  run();
};

// ── init ──────────────────────────
const snap=loadSnap();
if(snap && snap.items && snap.items.length){ ITEMS=snap.items; render(); }
run();
</script>
</body>
</html>
