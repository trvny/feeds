<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>feeds</title>
<style>
  :root{
    --bg:#0f0e0d; --card:#1a1817; --line:#2a2725; --fg:#ece8e3;
    --mut:#8c857c; --accent:#d6541a; --accent-dim:#3a221541;
  }
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--bg);color:var(--fg);
    font:16px/1.45 system-ui,-apple-system,"Segoe UI",Roboto,sans-serif}
  a{color:inherit;text-decoration:none}
  header{position:sticky;top:0;z-index:5;background:var(--bg);
    padding:env(safe-area-inset-top) 16px 8px;border-bottom:1px solid var(--line)}
  .bar{display:flex;align-items:baseline;gap:10px;padding-top:12px}
  .bar h1{font-size:20px;margin:0;font-weight:800;letter-spacing:-.02em}
  .bar h1 b{color:var(--accent)}
  .bar .n{color:var(--mut);font-size:13px;margin-right:auto}
  .bar button{background:none;border:none;color:var(--mut);font-size:20px;
    padding:4px 6px;cursor:pointer}
  .chips{display:flex;gap:8px;overflow-x:auto;padding:10px 0 2px;
    scrollbar-width:none}.chips::-webkit-scrollbar{display:none}
  .chip{flex:0 0 auto;border:1px solid var(--line);background:var(--card);
    color:var(--mut);border-radius:999px;padding:5px 12px;font-size:13px;
    white-space:nowrap;cursor:pointer}
  .chip.on{background:var(--accent-dim);border-color:var(--accent);color:var(--fg)}
  main{padding:8px 16px 40px;max-width:760px;margin:0 auto}
  .item{display:block;padding:13px 0;border-bottom:1px solid var(--line)}
  .item .src{font-size:11px;font-weight:700;text-transform:uppercase;
    letter-spacing:.04em;color:var(--accent)}
  .item .t{font-size:16px;font-weight:600;margin:3px 0 2px;
    letter-spacing:-.01em}
  .item .meta{font-size:12px;color:var(--mut)}
  .msg{color:var(--mut);text-align:center;padding:48px 16px;font-size:14px}
  .warn{color:var(--mut);font-size:12px;text-align:center;padding:10px;
    cursor:pointer}
  dialog{background:var(--card);color:var(--fg);border:1px solid var(--line);
    border-radius:14px;max-width:420px;width:92%;padding:18px}
  dialog::backdrop{background:#000a}
  dialog h2{margin:0 0 12px;font-size:16px}
  dialog label{display:block;font-size:12px;color:var(--mut);margin:12px 0 4px}
  dialog input{width:100%;background:var(--bg);border:1px solid var(--line);
    color:var(--fg);border-radius:8px;padding:9px;font-size:13px}
  dialog .row{display:flex;gap:8px;margin-top:16px;justify-content:flex-end}
  dialog button{border:1px solid var(--line);background:var(--bg);color:var(--fg);
    border-radius:8px;padding:8px 14px;font-size:14px;cursor:pointer}
  dialog button.p{background:var(--accent);border-color:var(--accent)}
  .bar2{height:2px;background:var(--accent);width:0;transition:width .2s;
    position:sticky;top:0;z-index:6}
</style>
</head>
<body>
<div class="bar2" id="prog"></div>
<header>
  <div class="bar">
    <h1>feed<b>·</b>seek</h1>
    <span class="n" id="count"></span>
    <button id="refresh" title="Refresh">↻</button>
    <button id="gear" title="Settings">⚙</button>
  </div>
  <div class="chips" id="chips"></div>
</header>
<main id="list"><div class="msg">Loading…</div></main>

<dialog id="settings">
  <h2>Settings</h2>
  <label>CORS proxy prefix (your Worker, ends with <code>?url=</code>)</label>
  <input id="proxy" placeholder="https://feeds-proxy.you.workers.dev/?url=">
  <label>OPML URL</label>
  <input id="opml" placeholder="../subscriptions.opml">
  <div class="row">
    <button id="cancel">Cancel</button>
    <button class="p" id="save">Save</button>
  </div>
</dialog>

<script>
const $ = s => document.querySelector(s);
const cfg = {
  proxy: localStorage.getItem('proxy') || '',
  opml:  localStorage.getItem('opml')  || '../subscriptions.opml',
};
let ITEMS = [], FILTER = null, FAILED = [];

const prox = u => cfg.proxy ? cfg.proxy + encodeURIComponent(u) : u;

function txt(el, ...names){
  for(const n of names){
    const c = [...el.children].find(x => x.tagName.toLowerCase().replace(/^.*:/,'') === n);
    if(c && c.textContent.trim()) return c.textContent.trim();
  }
  return '';
}
function link(el){
  for(const c of el.children){
    const t = c.tagName.toLowerCase().replace(/^.*:/,'');
    if(t==='link'){
      const href = c.getAttribute('href');           // atom
      if(href && (c.getAttribute('rel')||'alternate')==='alternate') return href;
      if(c.textContent.trim()) return c.textContent.trim(); // rss
    }
  }
  return txt(el,'guid');
}

function parseFeed(xml, source){
  const doc = new DOMParser().parseFromString(xml, 'text/xml');
  if(doc.querySelector('parsererror')) throw new Error('bad xml');
  const nodes = [...doc.querySelectorAll('item, entry')];
  return nodes.map(n => {
    const d = txt(n,'pubdate','published','updated','date','dc:date');
    const ts = d ? Date.parse(d) : NaN;
    return { source, title: txt(n,'title') || '(untitled)',
             url: link(n), ts: isNaN(ts) ? 0 : ts };
  }).filter(i => i.title);
}

function rel(ts){
  if(!ts) return '';
  const s = (Date.now()-ts)/1000;
  if(s<3600) return Math.max(1,Math.round(s/60))+'m';
  if(s<86400) return Math.round(s/3600)+'h';
  if(s<604800) return Math.round(s/86400)+'d';
  return new Date(ts).toLocaleDateString(undefined,{month:'short',day:'numeric'});
}

async function loadFeed(f){
  const r = await fetch(prox(f.xmlUrl), {redirect:'follow'});
  if(!r.ok) throw new Error(r.status);
  return parseFeed(await r.text(), f.title);
}

async function run(){
  if(!ITEMS.length) $('#list').innerHTML = '<div class="msg">Loading…</div>';
  ITEMS = []; FAILED = [];
  let feeds;
  try{
    const r = await fetch(cfg.opml, {cache:'no-cache'});
    const doc = new DOMParser().parseFromString(await r.text(), 'text/xml');
    feeds = [...doc.querySelectorAll('outline[xmlUrl]')].map(o => ({
      title: o.getAttribute('title') || o.getAttribute('text') || 'feed',
      xmlUrl: o.getAttribute('xmlUrl'),
    }));
  }catch(e){
    $('#list').innerHTML = '<div class="msg">No <code>subscriptions.opml</code> yet.<br>Use the Feed Catcher userscript to add feeds.</div>';
    return;
  }
  if(!feeds.length){
    $('#list').innerHTML = '<div class="msg">No feeds in the OPML yet.</div>';
    return;
  }
  let done = 0;
  const results = await Promise.allSettled(feeds.map(async f => {
    try{ return await loadFeed(f); }
    finally{ done++; $('#prog').style.width = (done/feeds.length*100)+'%'; }
  }));
  results.forEach((res,i) => {
    if(res.status==='fulfilled') ITEMS.push(...res.value);
    else FAILED.push(feeds[i].title);
  });
  // dedupe by url, newest first
  const seen = new Set();
  ITEMS = ITEMS.filter(i => i.url && !seen.has(i.url) && seen.add(i.url))
               .sort((a,b)=>b.ts-a.ts).slice(0,250);
  if(ITEMS.length) try{ localStorage.setItem('snap', JSON.stringify({t:Date.now(),items:ITEMS})); }catch(e){}
  setTimeout(()=>$('#prog').style.width='0',300);
  render();
}

function render(){
  const sources = [...new Set(ITEMS.map(i=>i.source))].sort();
  $('#chips').innerHTML = ['All',...sources].map(s =>
    `<button class="chip${(FILTER===null&&s==='All')||FILTER===s?' on':''}" data-s="${s}">${s}</button>`
  ).join('');
  const shown = FILTER ? ITEMS.filter(i=>i.source===FILTER) : ITEMS;
  $('#count').textContent = `${shown.length} items · ${sources.length} feeds`;
  let html = shown.map(i => `
    <a class="item" href="${i.url}" target="_blank" rel="noopener">
      <div class="src">${i.source}</div>
      <div class="t">${esc(i.title)}</div>
      <div class="meta">${rel(i.ts)}</div>
    </a>`).join('');
  if(FAILED.length) html += `<div class="warn">⚠ ${FAILED.length} feed(s) failed${cfg.proxy?'':' — set a CORS proxy in ⚙'}</div>`;
  $('#list').innerHTML = html || '<div class="msg">Nothing here.</div>';
}
const esc = s => s.replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));

document.addEventListener('click', e => {
  const c = e.target.closest('.chip');
  if(c){ FILTER = c.dataset.s==='All' ? null : c.dataset.s; render(); }
});
$('#refresh').onclick = run;
$('#gear').onclick = () => {
  $('#proxy').value = cfg.proxy; $('#opml').value = cfg.opml;
  $('#settings').showModal();
};
$('#cancel').onclick = () => $('#settings').close();
$('#save').onclick = () => {
  cfg.proxy = $('#proxy').value.trim(); cfg.opml = $('#opml').value.trim() || '../subscriptions.opml';
  localStorage.setItem('proxy', cfg.proxy); localStorage.setItem('opml', cfg.opml);
  $('#settings').close(); run();
};
function paintCache(){
  try{
    const s = JSON.parse(localStorage.getItem('snap')||'null');
    if(s && s.items && s.items.length){ ITEMS = s.items; render(); }
  }catch(e){}
}
paintCache();
run();
</script>
</body>
</html>
